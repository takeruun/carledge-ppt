<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=1280, height=720, initial-scale=1.0" name="viewport"/>
<title>Carledge Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #F5F5F5; font-family: 'Zen Kaku Gothic New', sans-serif; }
        .slide-container { position: relative; width: 1280px; height: 720px; overflow: hidden; background-color: #F5F5F5; }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Header Bar -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 0; top: 0; width: 1280px; height: 77px; background-color: #2E3A87; z-index: 1;"></div>
<!-- Background Decoration: Orange Circle Bottom Right -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: 850px; top: 270px; width: 600px; height: 600px; border-radius: 50%; background-color: #FFA726; opacity: 0.1; z-index: 1;"></div>
<!-- Background Decoration: Navy Square Top Left -->
<div data-object="true" data-object-type="shape" style="position: absolute; left: -50px; top: 150px; width: 200px; height: 200px; background-color: #2E3A87; opacity: 0.05; transform: rotate(45deg); z-index: 1;"></div>
<!-- Center Icon -->
<div data-object="true" data-object-type="icon" style="position: absolute; left: 600px; top: 180px; width: 80px; height: 80px; z-index: 5; color: #2E3A87; text-align: center;">
<i class="fa-solid fa-car-side" style="font-size: 80px;"></i>
</div>
<!-- Tagline -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 0; top: 280px; width: 1280px; height: 50px; z-index: 10; text-align: center;">
<p style="margin: 0; font-size: 28px; font-weight: 700; color: #FFA726; letter-spacing: 0.1em;">紙の帳簿を、デジタルへ。</p>
</div>
<!-- Main Title -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 0; top: 330px; width: 1280px; height: 130px; z-index: 10; text-align: center;">
<h1 style="margin: 0; font-size: 96px; font-weight: 900; color: #2E3A87; line-height: 1.2; letter-spacing: -0.02em;">Carledge<span style="font-size: 0.5em; margin-left: 20px; font-weight: 500; color: #333333; vertical-align: middle;">カーレッジ</span></h1>
</div>
<!-- Subtitle -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 290px; top: 480px; width: 700px; height: 128px; z-index: 10; text-align: center;">
<div style="border-top: 3px solid #FFA726; border-bottom: 3px solid #FFA726; padding: 15px 0;">
<p style="margin: 0; font-size: 32px; font-weight: 700; color: #333333; line-height: 1.35;">車販売店・整備工場向け 整備費用デジタル管理システム</p>
</div>
</div>
<!-- Footer / Date -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 0; top: 650px; width: 1280px; height: 30px; z-index: 10; text-align: center;">
<p style="margin: 0; font-size: 18px; color: #666666; font-weight: 500;">2026年4月1日</p>
</div>
<!-- Header Logo Text -->
<div data-object="true" data-object-type="textbox" style="position: absolute; left: 40px; top: 20px; width: 300px; height: 40px; z-index: 10;">
<p style="margin: 0; font-size: 24px; font-weight: 700; color: #FFFFFF;">Carledge</p>
</div>
</div>
</body>
</html>
