<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML Slide Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111827;
        --panel: rgba(17, 24, 39, 0.9);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f9fafb;
        --muted: #cbd5e1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .app[hidden] {
        display: none;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        z-index: 1;
        backdrop-filter: blur(8px);
      }

      .controls {
        display: flex;
        gap: 8px;
      }

      button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .ghost-button {
        margin-left: auto;
      }

      .status {
        min-width: 0;
        flex: 1;
      }

      .status strong,
      .status span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status span {
        color: var(--muted);
        margin-top: 4px;
        font-size: 13px;
      }

      .frame-wrap {
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.2), transparent 40%),
          var(--bg);
        padding: 18px;
        position: relative;
        overflow: hidden;
      }

      .slide-stage {
        position: absolute;
        left: 0;
        top: 0;
        width: 1280px;
        height: 720px;
        transform-origin: top left;
      }

      iframe {
        width: 1280px;
        height: 720px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #fff;
        display: block;
      }

      .empty {
        display: grid;
        place-items: center;
        height: 100%;
        border: 1px dashed var(--line);
        border-radius: 14px;
        color: var(--muted);
        text-align: center;
        padding: 24px;
      }

      code,
      kbd {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      kbd {
        border: 1px solid var(--line);
        border-bottom-width: 2px;
        border-radius: 6px;
        padding: 2px 6px;
        font-size: 12px;
      }

      .auth-screen {
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.22), transparent 35%),
          var(--bg);
      }

      .auth-card {
        width: min(100%, 420px);
        background: rgba(17, 24, 39, 0.92);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
      }

      .auth-card h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      .auth-card p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      .auth-form {
        display: grid;
        gap: 12px;
      }

      .auth-form label {
        font-size: 14px;
        color: var(--muted);
      }

      .auth-form input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        padding: 12px 14px;
        font-size: 16px;
      }

      .auth-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .auth-submit {
        min-width: 120px;
      }

      .auth-error {
        min-height: 20px;
        color: #fca5a5;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <section class="auth-screen" id="authScreen">
      <div class="auth-card">
        <h1>Protected Slides</h1>
        <p>閲覧前にパスワードを入力してください。</p>
        <form class="auth-form" id="authForm">
          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" name="password" autocomplete="current-password" required />
          <div class="auth-actions">
            <button class="auth-submit" id="loginButton" type="submit">Unlock</button>
          </div>
          <div class="auth-error" id="authError"></div>
        </form>
      </div>
    </section>

    <div class="app" id="app" hidden>
      <header class="toolbar">
        <div class="controls">
          <button id="prev">Prev</button>
          <button id="next">Next</button>
        </div>
        <div class="status">
          <strong id="title">Slides</strong>
          <span id="meta">← → キーでも移動できます</span>
        </div>
        <button class="ghost-button" id="logoutButton" type="button">Lock</button>
      </header>
      <main class="frame-wrap" id="frameWrap"></main>
    </div>

    <script src="./slides.js"></script>
    <script>
      const AUTH_API_URL = "https://api.carledge.jp/auth/presentation";
      const AUTH_STORAGE_KEY = "pptx-slide-auth-token";
      const BASE_WIDTH = 1280;
      const BASE_HEIGHT = 720;
      const state = { slides: [], index: 0 };
      const app = document.getElementById("app");
      const authScreen = document.getElementById("authScreen");
      const authForm = document.getElementById("authForm");
      const passwordInput = document.getElementById("passwordInput");
      const authError = document.getElementById("authError");
      const loginButton = document.getElementById("loginButton");
      const logoutButton = document.getElementById("logoutButton");
      const prevButton = document.getElementById("prev");
      const nextButton = document.getElementById("next");
      const title = document.getElementById("title");
      const meta = document.getElementById("meta");
      const frameWrap = document.getElementById("frameWrap");
      let stage = null;

      function layoutStage() {
        if (!stage) {
          return;
        }

        const { width, height } = frameWrap.getBoundingClientRect();
        const scale = Math.min(width / BASE_WIDTH, height / BASE_HEIGHT);
        const scaledWidth = BASE_WIDTH * scale;
        const scaledHeight = BASE_HEIGHT * scale;
        const offsetX = Math.max((width - scaledWidth) / 2, 0);
        const offsetY = Math.max((height - scaledHeight) / 2, 0);

        stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      }

      function showAuth() {
        app.hidden = true;
        authScreen.hidden = false;
      }

      function showSlides() {
        authScreen.hidden = true;
        app.hidden = false;
        renderSlide();
        layoutStage();
      }

      function setAuthError(message) {
        authError.textContent = message;
      }

      function storeAuthToken(token) {
        if (token) {
          sessionStorage.setItem(AUTH_STORAGE_KEY, token);
        } else {
          sessionStorage.setItem(AUTH_STORAGE_KEY, "ok");
        }
      }

      function clearAuthToken() {
        sessionStorage.removeItem(AUTH_STORAGE_KEY);
      }

      function hasStoredAuth() {
        return Boolean(sessionStorage.getItem(AUTH_STORAGE_KEY));
      }

      function updateButtons() {
        prevButton.disabled = state.index <= 0;
        nextButton.disabled = state.index >= state.slides.length - 1;
      }

      function renderEmpty(message, detail) {
        frameWrap.innerHTML = `
          <div class="empty">
            <div>
              <p>${message}</p>
              <p>${detail}</p>
              <p><kbd>←</kbd> <kbd>→</kbd> でも移動できます。</p>
            </div>
          </div>
        `;
        title.textContent = "スライドがありません";
        meta.textContent = "page/*.html を追加して slides.js を再生成してください";
        updateButtons();
      }

      function renderSlide() {
        const slide = state.slides[state.index];
        if (!slide) {
          renderEmpty(
            "<code>page/*.html</code> がまだありません。",
            "<code>npm run build-slides</code> で一覧を更新できます。"
          );
          return;
        }

        frameWrap.innerHTML = "";
        stage = document.createElement("div");
        stage.className = "slide-stage";
        const iframe = document.createElement("iframe");
        iframe.src = slide.path;
        iframe.title = slide.name;
        stage.appendChild(iframe);
        frameWrap.appendChild(stage);
        layoutStage();

        title.textContent = "Slides";
        meta.textContent = `${state.index + 1} / ${state.slides.length}`;
        updateButtons();
      }

      function move(delta) {
        const nextIndex = state.index + delta;
        if (nextIndex < 0 || nextIndex >= state.slides.length) {
          return;
        }
        state.index = nextIndex;
        renderSlide();
      }

      prevButton.addEventListener("click", () => move(-1));
      nextButton.addEventListener("click", () => move(1));
      logoutButton.addEventListener("click", () => {
        clearAuthToken();
        frameWrap.innerHTML = "";
        stage = null;
        passwordInput.value = "";
        setAuthError("");
        showAuth();
      });

      document.addEventListener("keydown", (event) => {
        if (app.hidden) {
          return;
        }
        if (event.key === "ArrowLeft") move(-1);
        if (event.key === "ArrowRight") move(1);
      });

      window.addEventListener("resize", layoutStage);

      authForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setAuthError("");
        loginButton.disabled = true;

        try {
          const response = await fetch(AUTH_API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              password: passwordInput.value,
            }),
          });

          let payload = {};
          try {
            payload = await response.json();
          } catch {
            payload = {};
          }

          const authenticated = response.ok;
          if (!authenticated) {
            throw new Error(payload.message || "パスワードが違うか、認証APIに接続できませんでした。");
          }

          storeAuthToken('ok');
          showSlides();
        } catch (error) {
          setAuthError(error.message);
        } finally {
          loginButton.disabled = false;
        }
      });

      state.slides = Array.isArray(window.__SLIDES__) ? window.__SLIDES__ : [];

      if (window.__SLIDES_ERROR__) {
        renderEmpty(
          "<code>slides.js</code> の読み込みに失敗しました。",
          "ホスティング前に <code>npm run build-slides</code> を実行してください。"
        );
      } else if (hasStoredAuth()) {
        showSlides();
      } else {
        showAuth();
      }
    </script>
  </body>
</html>
